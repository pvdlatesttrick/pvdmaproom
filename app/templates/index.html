<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: Arial, sans-serif;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .leaflet-popup-content {
        width: 280px;
      }
      .muted {
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const map = L.map("map").setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 18
      }).addTo(map);

      const markerLayer = L.layerGroup().addTo(map);

      function truncate(text, maxLen = 240) {
        if (!text) return "";
        return text.length > maxLen ? `${text.slice(0, maxLen - 1)}…` : text;
      }

      function popupHtml(story) {
        const safeTitle = story.title || "Untitled story";
        const safeUrl = story.url || "#";
        const source = story.source || "unknown";
        const published = story.published_at || "unknown date";
        const summary = truncate(story.summary || "");
        return `
          <div>
            <div><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a></div>
            <div class="muted">${source} - ${published}</div>
            <p>${summary}</p>
          </div>
        `;
      }

      async function refreshStories() {
        try {
          const response = await fetch("/api/stories");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const stories = await response.json();

          markerLayer.clearLayers();
          stories.forEach((story) => {
            if (typeof story.lat !== "number" || typeof story.lon !== "number") return;
            const marker = L.marker([story.lat, story.lon]);
            marker.bindPopup(popupHtml(story));
            marker.addTo(markerLayer);
          });
        } catch (error) {
          // Keep map visible even if API polling fails.
          console.error("Failed to refresh stories:", error);
        }
      }

      refreshStories();
      setInterval(refreshStories, 30000);
    </script>
  </body>
</html>
