<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PVD-style Leaflet map (world)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { height: 100vh; }
    .leaflet-popup-content { margin: 12px 16px; min-width: 200px; max-width: 320px; }
    .popup-title { font-weight: 700; font-size: 1.05em; margin-bottom: 8px; }
    .popup-summary { margin: 8px 0; line-height: 1.4; color: #333; }
    .popup-source { margin-top: 10px; }
    .popup-source a { color: #1a73e8; text-decoration: none; }
    .popup-source a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // 1. Data structure: array of marker objects
    // -------------------------------------------------------------------------
    const markersData = [
      {
        lat: 41.0082,
        lng: 28.9784,
        title: "Evliya Çelebi",
        summary: "Ottoman explorer and travel writer. His Seyahatnâme is a key source for 17th-century Middle East and Balkans.",
        sourceUrl: "https://en.wikipedia.org/wiki/Evliya_%C3%87elebi",
        category: "history"
      },
      {
        lat: 35.6762,
        lng: 139.6503,
        title: "Tokyo",
        summary: "Capital of Japan. One of the world's most populous megacities and a major global financial and cultural hub.",
        sourceUrl: "https://en.wikipedia.org/wiki/Tokyo",
        category: "places"
      },
      {
        lat: -33.8688,
        lng: 151.2093,
        title: "Sydney",
        summary: "Largest city in Australia. Major gateway and economic center for the Asia-Pacific region.",
        sourceUrl: "https://en.wikipedia.org/wiki/Sydney",
        category: "places"
      },
      {
        lat: 40.7128,
        lng: -74.0060,
        title: "New York City",
        summary: "Largest city in the United States. Global center for finance, culture, and diplomacy.",
        sourceUrl: "https://en.wikipedia.org/wiki/New_York_City",
        category: "places"
      }
      // Add more objects worldwide: { lat, lng, title, summary, sourceUrl, category }
    ];

    // -------------------------------------------------------------------------
    // 2. Category → pin color (My Maps–style: different colors per category/week)
    // -------------------------------------------------------------------------
    const CATEGORY_COLORS = {
      history:   "#5C6BC0",  // indigo
      places:     "#43A047",  // green
      week1:      "#E53935",  // red
      week2:      "#FB8C00",  // orange
      week3:      "#FDD835",  // yellow
      default:    "#1E88E5"   // blue
    };

    function getColorForCategory(category) {
      return CATEGORY_COLORS[category] || CATEGORY_COLORS.default;
    }

    // Colored pin as divIcon (circle with tail, like My Maps)
    function createCategoryIcon(category) {
      const color = getColorForCategory(category);
      return L.divIcon({
        className: "custom-pin",
        html: `<div style="
          width: 0; height: 0;
          border-left: 12px solid transparent;
          border-right: 12px solid transparent;
          border-bottom: 24px solid ${color};
          margin-left: -12px;
          margin-top: -24px;
          filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        "></div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 24],
        popupAnchor: [0, -24]
      });
    }

    // -------------------------------------------------------------------------
    // 3. Popup HTML: title (bold), summary, "Source" link
    // -------------------------------------------------------------------------
    function buildPopupContent(m) {
      const title = escapeHtml(m.title || "Untitled");
      const summary = escapeHtml(m.summary || "");
      const url = (m.sourceUrl || "#").trim();
      const link = url === "#" ? "" : `<p class="popup-source"><a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">Source</a></p>`;
      return `
        <div class="popup-title">${title}</div>
        <p class="popup-summary">${summary}</p>
        ${link}
      `;
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // -------------------------------------------------------------------------
    // 4. Map init and markers loop
    // -------------------------------------------------------------------------
    const map = L.map("map", {
      zoomControl: true
    }).setView([20, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    markersData.forEach(function (m) {
      const marker = L.marker([m.lat, m.lng], {
        icon: createCategoryIcon(m.category)
      });
      marker.bindPopup(buildPopupContent(m), {
        maxWidth: 320
      });
      marker.addTo(map);
    });
  </script>
</body>
</html>
